services:
  mongo:
    image: mongo:6.0
    container_name: arbitrum-mongo-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: arbitrum
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  mongo-backup:
    image: mongo:6.0
    container_name: arbitrum-mongo-backup-prod
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI is required}
      MONGO_DATABASE: arbitrum
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-10}
    volumes:
      - mongo-prod-backups:/backups
      - ./scripts/mongo-backup.sh:/usr/local/bin/mongo-backup.sh:ro
    command: ["sh", "/usr/local/bin/mongo-backup.sh"]
    depends_on:
      mongo:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: arbitrum-redis-prod
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./logs/backend:/app/logs
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PROCESS_ROLE=api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-2:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./logs/backend:/app/logs
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PROCESS_ROLE=api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: arbitrum-worker-prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./logs/backend:/app/logs
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PROCESS_ROLE=worker
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: arbitrum-frontend-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
      backend-2:
        condition: service_healthy

volumes:
  mongo-prod-data:
  mongo-prod-backups:
  redis-prod-data:
