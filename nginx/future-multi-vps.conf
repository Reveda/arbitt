# DEPLOYMENT CONFIGURATION: future multi-VPS edge load balancer.
# Before enabling this file, replace every value marked REPLACE_...
# Do not reload Nginx while REPLACE_... values remain in this file.

events {
    worker_connections 8192;
}

http {
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    upstream application_servers {
        least_conn;

        # These are private IPs of the application VPS servers.
        server REPLACE_APP_SERVER_1_PRIVATE_IP:8080 max_fails=3 fail_timeout=15s;
        server REPLACE_APP_SERVER_2_PRIVATE_IP:8080 max_fails=3 fail_timeout=15s;
        # Add this before high traffic if a third app VPS is available:
        # server REPLACE_APP_SERVER_3_PRIVATE_IP:8080 max_fails=3 fail_timeout=15s;

        keepalive 128;
    }

    server {
        listen 80;
        server_name REPLACE_DOMAIN REPLACE_WWW_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name REPLACE_DOMAIN REPLACE_WWW_DOMAIN;

        ssl_certificate REPLACE_SSL_CERTIFICATE_PATH;
        ssl_certificate_key REPLACE_SSL_CERTIFICATE_KEY_PATH;
        ssl_protocols TLSv1.2 TLSv1.3;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 10m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # This endpoint is used by the load balancer to test API availability.
        location = /api/v1/health {
            proxy_pass http://application_servers;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        location /api/ {
            limit_req zone=api_per_ip burst=40 nodelay;
            proxy_pass http://application_servers;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 90s;
        }

        location / {
            proxy_pass http://application_servers;
            proxy_connect_timeout 5s;
            proxy_read_timeout 90s;
        }
    }
}
