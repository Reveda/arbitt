services:
  - type: web
    name: arbitt
    runtime: node
    region: singapore
    branch: main
    buildCommand: cd backend && npm ci && npm run build && cd ../frontend && npm ci && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: PORT
        value: "10000"
      - key: API_PREFIX
        value: /api/v1
      - key: FRONTEND_URL
        value: https://arbitt.onrender.com
      - key: VITE_API_BASE_URL
        value: /api/v1
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: lax
      - key: REDIS_ENABLED
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PAYMENT_WALLET_ENCRYPTION_KEY
        generateValue: true
